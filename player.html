<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - F1 Bingo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Re-use your existing Bingo CSS here */
        :root { --f1-red: #E10600; --f1-dark: #15151E; --f1-grey: #333; }
        body { font-family: Arial, sans-serif; background: var(--f1-dark); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: var(--f1-red); padding: 8px; border-radius: 8px; width: 100%; max-width: 500px; }
        .cell { background: var(--f1-grey); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 5px; font-size: 0.75rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .cell.marked { opacity: 0.5; border: 2px solid white; }
        .cell.live-happened { background: gold !important; color: black; box-shadow: 0 0 15px gold; }
        .free-space { background: var(--f1-red); }
    </style>
</head>
<body>
    <h2 id="status">Loading Board...</h2>
    <div class="bingo-board" id="board"></div>
        <div id="setup-controls" style="display:none; margin: 20px;">
        <p>Double-click a cell to swap it, or click Finish to lock your board!</p>
        <button onclick="finalizeBoard()" style="background: #28a745;">Finish & Register Board</button>
    </div>

    <div id="swap-modal" class="modal">
        <div class="modal-content">
            <h3>Swap Event</h3>
            <p>Pick a new event for this square:</p>
            <select id="event-picker"></select>
            <div style="margin-top: 20px;">
                <button onclick="applySwap()">Swap Square</button>
                <button onclick="closeModal()" style="background:#666;">Cancel</button>
            </div>
        </div>
    </div>

    <style>
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: var(--f1-dark); padding: 30px; border: 2px solid var(--f1-red); border-radius: 8px; width: 90%; max-width: 400px; text-align: center; }
        #event-picker { width: 100%; padding: 10px; background: #222; color: white; border: 1px solid #555; }
    </style>
    <script>
        // 1. CREDENTIALS & GLOBAL STATE
        const db = supabase.createClient('https://aqsaztcdkcbnhstjseam.supabase.co', 'sb_publishable_Q7mqIq2YrT3vscykJmLvOA_AliGTKCe');
        let liveEvents = new Set();
        let myBoardData = {
            id: localStorage.getItem('f1_bingo_id'), 
            playerName: '',
            layout: [],
            marks: []
        };
        let isEditing = false;
        let selectedCellIndex = null;
        let fullEventPool = [];

        // 2. THE ENGINE (The logic that decides what to show)
        async function init() {
            // A. Always check what has happened in the race first
            const { data: live } = await db.from('live_race_state').select('event_text').eq('is_happened', true);
            live?.forEach(l => liveEvents.add(l.event_text));
            setupListener();

            // B. Security/Persistence Check: Do they have a saved board?
            if (myBoardData.id) {
                loadExistingBoard();
            } else {
                // This is a new player
                showSetupScreen(); 
            }
        }

        // 3. PERSISTENCE LOGIC (Talking to 'player_boards')
        async function loadExistingBoard() {
            const { data, error } = await db.from('player_boards')
                .select('*')
                .eq('id', myBoardData.id)
                .single();

            if (data) {
                myBoardData.playerName = data.player_name;
                myBoardData.layout = data.layout;
                myBoardData.marks = data.marks || [];
                isEditing = false; // They are in "Play Mode"
                renderBoard();
                document.getElementById('status').innerText = `Driver: ${data.player_name}`;
            } else {
                localStorage.removeItem('f1_bingo_id');
                showSetupScreen();
            }
        }

        // 4. SETUP & MODAL LOGIC (The "Pit Stop" customization)
        async function showSetupScreen() {
            const name = prompt("Enter your Driver Name for the leaderboard:");
            if (!name) return;
            myBoardData.playerName = name;

            const { data: pool } = await db.from('f1_events_pool').select('Event');
            fullEventPool = pool.map(x => x.Event);

            let shuffled = [...fullEventPool].sort(() => 0.5 - Math.random()).slice(0, 24);
            shuffled.splice(12, 0, "FREE SPACE");
            myBoardData.layout = shuffled;

            isEditing = true; // They are in "Edit Mode"
            document.getElementById('setup-controls').style.display = 'block';
            renderBoard();
        }

        // ... include the openSwapModal, applySwap, and finalizeBoard functions here ...

        // 5. THE RENDERER (Drawing the actual grid)
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = "";
            // ... use the logic from the previous message ...
        }

        // 6. REAL-TIME LISTENER
        function setupListener() {
            db.channel('live-updates')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'live_race_state' }, (payload) => {
                    if (payload.new.is_happened) liveEvents.add(payload.new.event_text);
                    else liveEvents.delete(payload.new.event_text);
                    renderBoard(); 
                }).subscribe();
        }

        // START THE APP
        init();
    </script>
</body>
</html>
