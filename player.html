<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - F1 Bingo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Re-use your existing Bingo CSS here */
        :root { --f1-red: #E10600; --f1-dark: #15151E; --f1-grey: #333; }
        body { font-family: Arial, sans-serif; background: var(--f1-dark); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: var(--f1-red); padding: 8px; border-radius: 8px; width: 100%; max-width: 500px; }
        .cell { background: var(--f1-grey); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 5px; font-size: 0.75rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .cell.marked { opacity: 0.5; border: 2px solid white; }
        .cell.live-happened { background: gold !important; color: black; box-shadow: 0 0 15px gold; }
        .free-space { background: var(--f1-red); }
    </style>
</head>
<body>
    <h2 id="status">Loading Board...</h2>
    <div class="bingo-board" id="board"></div>

    <script>
        const db = supabase.createClient('https://aqsaztcdkcbnhstjseam.supabase.co', 'sb_publishable_Q7mqIq2YrT3vscykJmLvOA_AliGTKCe');
        let liveEvents = new Set();
        let currentBoardLayout = [];

        async function init() {
            try {
                const statusEl = document.getElementById('status');
                
                // 1. Fetch Pool (Make sure 'Event' matches your Supabase column name exactly!)
                const { data: pool, error: poolError } = await db.from('f1_events_pool').select('Event');
                if (poolError) throw poolError;
                if (!pool || pool.length < 24) {
                    statusEl.innerText = "Error: Not enough events in database!";
                    return;
                }

                // 2. Fetch Live State
                const { data: live } = await db.from('live_race_state').select('event_text').eq('is_happened', true);
                live?.forEach(l => liveEvents.add(l.event_text));

                // 3. Randomize and Build Layout
                // We shuffle the pool and take 24 items
                let shuffled = pool
                    .map(x => x.Event)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 24);
                
                // Insert Free Space at index 12 (center)
                shuffled.splice(12, 0, "FREE SPACE");
                currentBoardLayout = shuffled;

                renderBoard();
                setupListener();
                
                statusEl.innerText = "Race Live";
                statusEl.style.color = "#00ff00"; // Green for 'Go'

            } catch (err) {
                console.error("Initialization error:", err);
                document.getElementById('status').innerText = "Connection Error. Check Console.";
            }
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = "";

            currentBoardLayout.forEach((text, index) => {
                const cell = document.createElement('div');
                cell.className = "cell";
                if (text === "FREE SPACE") cell.classList.add('free-space');
                
                // Check if this event has happened live
                if (liveEvents.has(text)) cell.classList.add('live-happened');

                cell.innerText = text;

                // CLICK LOGIC
                cell.onclick = (e) => {
                    // SINGLE CLICK: Mark the cell
                    cell.classList.toggle('marked');
                };

                // DOUBLE CLICK: Change the cell (The Swap feature)
                cell.ondblclick = () => {
                    if (text === "FREE SPACE") return;
                    const newEvent = prompt("Enter a custom event or swap idea for this square:", text);
                    if (newEvent && newEvent !== text) {
                        currentBoardLayout[index] = newEvent;
                        renderBoard(); // Re-draw with the new text
                    }
                };

                boardEl.appendChild(cell);
            });
        }

        function setupListener() {
            db.channel('live-updates')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'live_race_state' }, (payload) => {
                    console.log("Change detected!", payload);
                    // Instead of a full reload, let's just update our local set
                    if (payload.new.is_happened) liveEvents.add(payload.new.event_text);
                    else liveEvents.delete(payload.new.event_text);
                    renderBoard(); 
                }).subscribe();
        }

        init();
    </script>
</body>
</html>
