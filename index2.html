<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDCORP F1 Bingo - Join the Race</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --f1-red: #e10600; --f1-black: #15151e; --f1-dark: #1f1f27; }
        body { background-color: var(--f1-black); color: white; font-family: 'Titillium Web', sans-serif; text-align: center; padding: 50px 20px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--f1-dark); padding: 30px; border-top: 5px solid var(--f1-red); border-radius: 8px; }
        h1 { font-style: italic; text-transform: uppercase; letter-spacing: 2px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 1.1em; transition: 0.3s; }
        .btn-new { background: var(--f1-red); color: white; }
        .btn-recover { background: #444; color: white; border: 1px solid #666; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #444; background: #15151e; color: white; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>F1 Bingo 2026</h1>
    <p>Select your entry type below</p>

    <a href="player.html" class="btn btn-new" onclick="localStorage.removeItem('f1_bingo_id')">New Board</a>

    <hr style="border: 0.5px solid #444; margin: 25px 0;">

    <div id="recovery-section">
        <p>Already registered on another device?</p>
        <input type="text" id="recover-name" placeholder="Enter your Driver Name">
        <button class="btn btn-recover" onclick="recoverBoard()">Find My Board</button>
    </div>
</div>

<script>
    const db = supabase.createClient('YOUR_URL', 'YOUR_KEY');

    async function recoverBoard() {
        const name = document.getElementById('recover-name').value.trim();
        if (!name) return alert("Please enter your name!");

        // Search for the latest board with this name
        const { data, error } = await db.from('player_boards')
            .select('id')
            .eq('player_name', name)
            .order('created_at', { ascending: false })
            .limit(1)
            .maybeSingle();

        if (error) {
            console.error(error);
            alert("Error searching for board.");
        } else if (data) {
            // Save the ID to localStorage so player.html knows who this is
            localStorage.setItem('f1_bingo_id', data.id);
            window.location.href = 'player.html';
        } else {
            alert("No board found for that name. Try starting a new one!");
        }
    }
</script>

</body>
</html>
