<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host - F1 Race Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --f1-red: #e10600; --f1-dark: #1f1f27; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: white; padding: 20px; }
        
        .header-container { position: relative; border-bottom: 2px solid var(--f1-red); margin-bottom: 10px; padding-bottom: 10px; }
        
        .btn-add-main { 
            position: absolute; right: 0; top: 10px; 
            background: var(--f1-red); color: white; border: none; 
            padding: 10px 20px; font-weight: bold; border-radius: 4px; 
        }

        /* Search Bar Styling */
        #search-container { margin-bottom: 20px; }
        #event-search { 
            width: 100%; padding: 12px; background: #222; color: white; 
            border: 1px solid #444; border-radius: 4px; box-sizing: border-box;
            font-size: 1rem;
        }

        .event-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; transition: background 0.2s; }
        .event-row.hidden { display: none; }
        .event-row:hover { background: #1a1a1a; }

        #race-selector-container {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        #race-selector-container label {
            font-weight: bold;
            color: #ddd;
        }
        #race-select {
            min-width: 320px;
            max-width: 100%;
            padding: 10px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }
        #end-race-btn {
            background: #d32f2f;
            color: #fff;
            margin-left: auto;
        }
        #end-race-btn:disabled {
            opacity: 0.7;
            cursor: wait;
        }
        #leaderboard-container {
            margin-top: 22px;
            border-top: 1px solid #333;
            padding-top: 16px;
        }
        #leaderboard-container h2 {
            margin: 0 0 8px 0;
            font-size: 1.15rem;
        }
        #leaderboard-status {
            color: #bbb;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        #leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background: #171717;
            border: 1px solid #333;
            display: none;
        }
        #leaderboard-table th, #leaderboard-table td {
            padding: 10px;
            border-bottom: 1px solid #2b2b2b;
            text-align: left;
        }
        #leaderboard-table th {
            color: #ddd;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: #1d1d1d;
        }
        #leaderboard-table td:last-child,
        #leaderboard-table th:last-child {
            text-align: right;
        }
        
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-on { background: #ffc107; color: black; } 
        .btn-mark { background: #444; color: white; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--f1-dark); padding: 30px; border: 2px solid var(--f1-red); border-radius: 8px; width: 90%; max-width: 400px; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; background: #111; color: white; border: 1px solid #444; box-sizing: border-box; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 id="host-title">F1 Bingo 2026 - Race Control</h1>
        <button id="add-event-trigger" class="btn-add-main" style="display:none;" onclick="openModal()">+ ADD EVENT</button>
    </div>

    <div id="auth">
        <input type="password" id="pass" placeholder="Secret Key" style="padding: 8px;">
        <button onclick="login()" style="background: var(--f1-red); color: white;">Login</button>
    </div>

    <div id="controls" style="display:none;">
        <div id="race-selector-container">
            <label for="race-select">Race:</label>
            <select id="race-select" onchange="saveSelectedRace()" disabled>
                <option>Loading races...</option>
            </select>
            <button id="end-race-btn" onclick="endRace()">END RACE</button>
        </div>
        <div id="search-container">
            <input type="text" id="event-search" placeholder="Search events (e.g. 'Safety Car' or 'Max')..." onkeyup="filterEvents()">
        </div>
        <div id="list"></div>
        <div id="leaderboard-container">
            <h2>Leaderboard</h2>
            <div id="leaderboard-status">Select a race to view leaderboard results.</div>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Driver</th>
                        <th>Events Hit</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">New Pool Event</h2>
            <input type="text" id="new-event-text" placeholder="e.g. Hamilton overtakes Perez">
            <select id="new-event-points" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #111; color: white; border: 1px solid #444;">
                <option value="1" style="color: #ffffff;">1 Point (Common)</option>
                <option value="2" style="color: #3c7a3e;">2 Points (Uncommon)</option>
                <option value="3" style="color: #19629e;">3 Points (Rare)</option>
                <option value="4" style="color: #9c27b0;">4 Points (Epic)</option>
                <option value="5" style="color: #910C0C;">5 Points (CHAOS)</option>
            </select>
            <div class="modal-actions">
                <button onclick="closeModal()" style="background:#555; color:white;">Cancel</button>
                <button onclick="saveNewEvent()" style="background:var(--f1-red); color:white;">Add to Race</button>
            </div>
        </div>
    </div>

    <script>
        const db = supabase.createClient('https://aqsaztcdkcbnhstjseam.supabase.co', 'sb_publishable_Q7mqIq2YrT3vscykJmLvOA_AliGTKCe');
        const CHAMPIONSHIP_YEAR = 2026;
        const FALLBACK_RACES_2026 = [
            'Australian Grand Prix',
            'Chinese Grand Prix',
            'Japanese Grand Prix',
            'Bahrain Grand Prix',
            'Saudi Arabian Grand Prix',
            'Miami Grand Prix',
            'Canadian Grand Prix',
            'Monaco Grand Prix',
            'Barcelona-Catalunya Grand Prix',
            'Austrian Grand Prix',
            'British Grand Prix',
            'Belgian Grand Prix',
            'Hungarian Grand Prix',
            'Dutch Grand Prix',
            'Italian Grand Prix',
            'Spanish Grand Prix',
            'Azerbaijan Grand Prix',
            'Singapore Grand Prix',
            'United States Grand Prix',
            'Mexico City Grand Prix',
            'Sao Paulo Grand Prix',
            'Las Vegas Grand Prix',
            'Qatar Grand Prix',
            'Abu Dhabi Grand Prix'
        ];

        const rarityColors = {
            1: "#ffffff", // Common (White)
            2: "#3c7a3e", // Uncommon (Green)
            3: "#19629e", // Rare (Blue)
            4: "#9c27b0", // Epic (Purple)
            5: "#910C0C"  // Chaos (Dark Red)
        };

        async function login() {
            const pass = document.getElementById('pass').value;
            const { data } = await db.from('app_config').select('value').eq('key', 'host_password').single();
            if (data && pass === data.value) {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
                document.getElementById('add-event-trigger').style.display = 'block';
                await initRaceSelector();
                await load();
                await loadLeaderboard();
            } else { alert("Denied."); }
        }

        function updateHostTitle(raceName) {
            const title = document.getElementById('host-title');
            if (!raceName) {
                title.innerText = `F1 Bingo ${CHAMPIONSHIP_YEAR} - Race Control`;
                return;
            }
            title.innerText = `${raceName} - Race Control`;
        }

        function extractRaceNamesFromCalendar(calendarText, year) {
            const raceNames = [];
            const seen = new Set();
            const linePattern = new RegExp(`FORMULA 1\\s+(.+?)\\s+${year}`, 'i');

            calendarText.split('\n').forEach(line => {
                if (!line.includes('FORMULA 1') || !line.includes(String(year))) return;
                const match = line.match(linePattern);
                if (!match) return;

                const candidate = match[1].replace(/\s+/g, ' ').trim();
                const isRaceName = /(GRAND PRIX|GRAN PREMIO|GRANDE PR)/i.test(candidate);
                const isTesting = /TESTING/i.test(candidate);
                if (!isRaceName || isTesting) return;
                if (seen.has(candidate)) return;

                seen.add(candidate);
                raceNames.push(candidate);
            });

            return raceNames;
        }

        async function fetchRaceNamesFromF1(year) {
            const sources = [
                `https://r.jina.ai/http://www.formula1.com/en/racing/${year}`,
                `https://r.jina.ai/http://www.formula1.com/en/racing/${year}.html`
            ];

            for (const source of sources) {
                try {
                    const res = await fetch(source, { cache: 'no-store' });
                    if (!res.ok) continue;
                    const text = await res.text();
                    const races = extractRaceNamesFromCalendar(text, year);
                    if (races.length >= 20) return races;
                } catch (err) {
                    console.warn(`Could not fetch race list from ${source}`, err);
                }
            }

            return FALLBACK_RACES_2026;
        }

        async function initRaceSelector() {
            const select = document.getElementById('race-select');
            const races = await fetchRaceNamesFromF1(CHAMPIONSHIP_YEAR);

            select.innerHTML = '<option value="">Select race</option>';
            races.forEach(race => {
                const option = document.createElement('option');
                option.value = race;
                option.textContent = race;
                select.appendChild(option);
            });
            select.disabled = false;

            const { data: selectedRaceRow } = await db
                .from('app_config')
                .select('value')
                .eq('key', 'selected_race_name')
                .maybeSingle();

            const selectedRace = selectedRaceRow?.value || '';
            if (selectedRace && !races.includes(selectedRace)) {
                const customOption = document.createElement('option');
                customOption.value = selectedRace;
                customOption.textContent = selectedRace;
                select.appendChild(customOption);
            }

            select.value = selectedRace;
            updateHostTitle(selectedRace);
        }

        async function saveSelectedRace() {
            const raceName = getSelectedRaceName();
            updateHostTitle(raceName);
            await loadLeaderboard();
            if (!raceName) return;

            const { data: updatedRows, error: updateErr } = await db
                .from('app_config')
                .update({ value: raceName })
                .eq('key', 'selected_race_name')
                .select('key');

            if (updateErr) {
                console.error('Failed to save race selection.', updateErr);
                alert('Could not save selected race.');
                return;
            }

            if (!updatedRows || updatedRows.length === 0) {
                const { error: insertErr } = await db
                    .from('app_config')
                    .insert([{ key: 'selected_race_name', value: raceName }]);
                if (insertErr) {
                    console.error('Failed to insert race selection.', insertErr);
                    alert('Could not save selected race.');
                }
            }

            await loadLeaderboard();
        }

        function getSelectedRaceName() {
            const select = document.getElementById('race-select');
            return (select?.value || '').trim();
        }

        function getSelectedRaceRound() {
            const select = document.getElementById('race-select');
            const raceName = getSelectedRaceName();
            if (!select || !raceName) return null;

            const options = Array.from(select.options).filter(opt => !!opt.value);
            const idx = options.findIndex(opt => opt.value === raceName);
            return idx >= 0 ? idx + 1 : null;
        }

        async function load() {
            const { data: pool } = await db.from('f1_events_pool').select('*');
            const { data: live } = await db.from('live_race_state').select('*');
            const list = document.getElementById('list');
            list.innerHTML = "";

            pool.sort((a, b) => a.Event.localeCompare(b.Event));

            pool.forEach(ev => {
                const active = live.find(l => l.event_text === ev.Event)?.is_happened;

                const pts = ev.points || 1;
                const badgeColor = rarityColors[pts] || "#ffffff";

                const div = document.createElement('div');
                div.className = "event-row";

                div.setAttribute('data-event', ev.Event.toLowerCase());

                const span = document.createElement('span');
                span.style.display = "flex";
                span.style.justifyContent = "space-between";
                span.style.alignItems = "center";
                span.style.width = "70%";

                span.innerHTML = `
                    <span>${ev.Event}</span>
                    <span style="color: ${badgeColor}; border: 1px solid ${badgeColor}44; font-size: 0.8rem; padding: 2px 8px; border-radius: 12px; font-weight: bold; background: ${badgeColor}11;">
                        ${pts} PTS
                    </span>
                `;

                const btn = document.createElement('button');
                btn.className = active ? 'btn-on' : 'btn-mark';
                btn.innerText = active ? 'HAPPENED' : 'MARK';

                btn.addEventListener('click', () => {
                    toggle(ev.Event, !!active, pts);
                });

                div.appendChild(span);
                div.appendChild(btn);
                list.appendChild(div);
            });

            filterEvents();
        }

        function filterEvents() {
            const query = document.getElementById('event-search').value.toLowerCase();
            const rows = document.querySelectorAll('.event-row');

            rows.forEach(row => {
                const text = row.getAttribute('data-event');
                if (text.includes(query)) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }

        async function toggle(text, status, pointsValue) {
            const { error } = await db.from('live_race_state').upsert({
                event_text: text,
                is_happened: !status,
                points: pointsValue
            });

            if (error) {
                console.error("Error toggling event:", error);
            } else {
                load();
            }
        }

        function openModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function closeModal() {
            document.getElementById('add-modal').style.display = 'none';
            document.getElementById('new-event-text').value = "";
        }

        async function saveNewEvent() {
            const text = document.getElementById('new-event-text').value.trim();
            const pointsVal = parseInt(document.getElementById('new-event-points').value);

            if (!text) return;

            const { error: poolErr } = await db.from('f1_events_pool')
                .insert([{ Event: text, points: pointsVal }]);

            const { error: liveErr } = await db.from('live_race_state')
                .insert([{ event_text: text, is_happened: false, points: pointsVal }]);

            if (!poolErr && !liveErr) {
                closeModal();
                load();
            } else {
                console.error("Pool Error:", poolErr, "Live Error:", liveErr);
                alert("Error adding event. Check console for details.");
            }
        }

        function buildLeaderboardRows(raceName, raceRound, boards, liveRows) {
            const pointsByEvent = new Map();
            (liveRows || []).forEach(row => {
                if (!row?.event_text) return;
                const parsed = Number(row.points);
                const pts = Number.isFinite(parsed) && parsed > 0 ? parsed : 1;
                pointsByEvent.set(row.event_text, pts);
            });

            const rows = (boards || []).map(board => {
                const layout = Array.isArray(board.layout) ? board.layout : [];
                let score = 0;
                let eventsHit = 0;

                layout.forEach(eventText => {
                    if (eventText === 'FREE SPACE') return;
                    if (!pointsByEvent.has(eventText)) return;

                    score += pointsByEvent.get(eventText);
                    eventsHit += 1;
                });

                return {
                    race_name: raceName,
                    race_round: raceRound,
                    player_id: String(board.id),
                    player_name: board.player_name || 'Unknown Driver',
                    score,
                    events_hit: eventsHit
                };
            });

            rows.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                if (b.events_hit !== a.events_hit) return b.events_hit - a.events_hit;
                return a.player_name.localeCompare(b.player_name);
            });

            return rows.map((row, idx) => ({ ...row, position: idx + 1 }));
        }

        async function endRace() {
            const raceName = getSelectedRaceName();
            const raceRound = getSelectedRaceRound();
            if (!raceName) {
                alert('Select a race before ending it.');
                return;
            }

            const ok = confirm(`End "${raceName}" and save leaderboard results for all drivers?`);
            if (!ok) return;

            const endRaceBtn = document.getElementById('end-race-btn');
            endRaceBtn.disabled = true;
            endRaceBtn.innerText = 'ENDING...';

            try {
                const { data: liveRows, error: liveErr } = await db
                    .from('live_race_state')
                    .select('event_text, points')
                    .eq('is_happened', true);

                if (liveErr) {
                    throw new Error(`Could not load race events: ${liveErr.message}`);
                }

                const { data: boards, error: boardErr } = await db
                    .from('player_boards')
                    .select('id, player_name, layout');

                if (boardErr) {
                    throw new Error(`Could not load player boards: ${boardErr.message}`);
                }

                const leaderboardRows = buildLeaderboardRows(raceName, raceRound, boards || [], liveRows || []);

                const { error: deleteErr } = await db
                    .from('leaderboard')
                    .delete()
                    .eq('race_name', raceName);

                if (deleteErr) {
                    throw new Error(`Could not clear previous leaderboard entries: ${deleteErr.message}`);
                }

                if (leaderboardRows.length > 0) {
                    const { error: insertErr } = await db
                        .from('leaderboard')
                        .insert(leaderboardRows);

                    if (insertErr) {
                        throw new Error(`Could not save leaderboard rows: ${insertErr.message}`);
                    }
                }

                await loadLeaderboard();
                alert(`Race ended. Saved ${leaderboardRows.length} leaderboard result(s) for ${raceName}.`);
            } catch (err) {
                console.error('Failed to end race:', err);
                const msg = err?.message || 'See console for details.';
                const rlsHint = /row-level security policy/i.test(msg)
                    ? '\n\nRLS fix: run leaderboard.sql in Supabase SQL Editor to create leaderboard policies.'
                    : '';
                alert(`Failed to end race. ${msg}\n\nExpected leaderboard columns: race_name, race_round, player_id, player_name, score, events_hit, position.${rlsHint}`);
            } finally {
                endRaceBtn.disabled = false;
                endRaceBtn.innerText = 'END RACE';
            }
        }

        function renderLeaderboard(rows, raceName) {
            const statusEl = document.getElementById('leaderboard-status');
            const tableEl = document.getElementById('leaderboard-table');
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (!rows.length) {
                tableEl.style.display = 'none';
                statusEl.innerText = `No leaderboard results saved yet for ${raceName}.`;
                return;
            }

            rows.forEach((row, index) => {
                const tr = document.createElement('tr');
                const pos = row.position || (index + 1);
                const hitCount = row.events_hit || 0;
                const score = row.score || 0;

                tr.innerHTML = `
                    <td>${pos}</td>
                    <td>${row.player_name || 'Unknown Driver'}</td>
                    <td>${hitCount}</td>
                    <td>${score}</td>
                `;
                tbody.appendChild(tr);
            });

            statusEl.innerText = `${rows.length} driver result(s) recorded for ${raceName}.`;
            tableEl.style.display = 'table';
        }

        async function loadLeaderboard() {
            const raceName = getSelectedRaceName();
            const statusEl = document.getElementById('leaderboard-status');
            const tableEl = document.getElementById('leaderboard-table');
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            if (!raceName) {
                tableEl.style.display = 'none';
                statusEl.innerText = 'Select a race to view leaderboard results.';
                return;
            }

            statusEl.innerText = `Loading leaderboard for ${raceName}...`;

            const { data, error } = await db
                .from('leaderboard')
                .select('position, player_name, events_hit, score')
                .eq('race_name', raceName)
                .order('position', { ascending: true })
                .order('score', { ascending: false });

            if (error) {
                console.error('Could not load leaderboard:', error);
                tableEl.style.display = 'none';
                statusEl.innerText = `Leaderboard not available for ${raceName}.`;
                return;
            }

            renderLeaderboard(data || [], raceName);
        }
    </script>
</body>
</html>
