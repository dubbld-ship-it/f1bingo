<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host - F1 Race Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --f1-red: #e10600; --f1-dark: #1f1f27; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: white; padding: 20px; }
        
        .header-container { position: relative; border-bottom: 2px solid var(--f1-red); margin-bottom: 10px; padding-bottom: 10px; }
        
        .btn-add-main { 
            position: absolute; right: 0; top: 10px; 
            background: var(--f1-red); color: white; border: none; 
            padding: 10px 20px; font-weight: bold; border-radius: 4px; 
        }

        /* Search Bar Styling */
        #search-container { margin-bottom: 20px; }
        #event-search { 
            width: 100%; padding: 12px; background: #222; color: white; 
            border: 1px solid #444; border-radius: 4px; box-sizing: border-box;
            font-size: 1rem;
        }

        .event-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; transition: background 0.2s; }
        .event-row.hidden { display: none; }
        .event-row:hover { background: #1a1a1a; }

        #race-selector-container {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        #race-selector-container label {
            font-weight: bold;
            color: #ddd;
        }
        #race-select {
            min-width: 320px;
            max-width: 100%;
            padding: 10px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }
        
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-on { background: #ffc107; color: black; } 
        .btn-mark { background: #444; color: white; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--f1-dark); padding: 30px; border: 2px solid var(--f1-red); border-radius: 8px; width: 90%; max-width: 400px; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; background: #111; color: white; border: 1px solid #444; box-sizing: border-box; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 id="host-title">F1 Bingo 2026 - Race Control</h1>
        <button id="add-event-trigger" class="btn-add-main" style="display:none;" onclick="openModal()">+ ADD EVENT</button>
    </div>

    <div id="auth">
        <input type="password" id="pass" placeholder="Secret Key" style="padding: 8px;">
        <button onclick="login()" style="background: var(--f1-red); color: white;">Login</button>
    </div>

    <div id="controls" style="display:none;">
        <div id="race-selector-container">
            <label for="race-select">Race:</label>
            <select id="race-select" onchange="saveSelectedRace()" disabled>
                <option>Loading races...</option>
            </select>
        </div>
        <div id="search-container">
            <input type="text" id="event-search" placeholder="Search events (e.g. 'Safety Car' or 'Max')..." onkeyup="filterEvents()">
        </div>
        <div id="list"></div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">New Pool Event</h2>
            <input type="text" id="new-event-text" placeholder="e.g. Hamilton overtakes Perez">
            <select id="new-event-points" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #111; color: white; border: 1px solid #444;">
                <option value="1" style="color: #ffffff;">1 Point (Common)</option>
                <option value="2" style="color: #3c7a3e;">2 Points (Uncommon)</option>
                <option value="3" style="color: #19629e;">3 Points (Rare)</option>
                <option value="4" style="color: #9c27b0;">4 Points (Epic)</option>
                <option value="5" style="color: #910C0C;">5 Points (CHAOS)</option>
            </select>
            <div class="modal-actions">
                <button onclick="closeModal()" style="background:#555; color:white;">Cancel</button>
                <button onclick="saveNewEvent()" style="background:var(--f1-red); color:white;">Add to Race</button>
            </div>
        </div>
    </div>

    <script>
        const db = supabase.createClient('https://aqsaztcdkcbnhstjseam.supabase.co', 'sb_publishable_Q7mqIq2YrT3vscykJmLvOA_AliGTKCe');
        const CHAMPIONSHIP_YEAR = 2026;
        const FALLBACK_RACES_2026 = [
            'Australian Grand Prix',
            'Chinese Grand Prix',
            'Japanese Grand Prix',
            'Bahrain Grand Prix',
            'Saudi Arabian Grand Prix',
            'Miami Grand Prix',
            'Canadian Grand Prix',
            'Monaco Grand Prix',
            'Barcelona-Catalunya Grand Prix',
            'Austrian Grand Prix',
            'British Grand Prix',
            'Belgian Grand Prix',
            'Hungarian Grand Prix',
            'Dutch Grand Prix',
            'Italian Grand Prix',
            'Spanish Grand Prix',
            'Azerbaijan Grand Prix',
            'Singapore Grand Prix',
            'United States Grand Prix',
            'Mexico City Grand Prix',
            'Sao Paulo Grand Prix',
            'Las Vegas Grand Prix',
            'Qatar Grand Prix',
            'Abu Dhabi Grand Prix'
        ];

        const rarityColors = {
            1: "#ffffff", // Common (White)
            2: "#3c7a3e", // Uncommon (Green)
            3: "#19629e", // Rare (Blue)
            4: "#9c27b0", // Epic (Purple)
            5: "#910C0C"  // Chaos (Dark Red)
        };

        async function login() {
            const pass = document.getElementById('pass').value;
            const { data } = await db.from('app_config').select('value').eq('key', 'host_password').single();
            if (data && pass === data.value) {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
                document.getElementById('add-event-trigger').style.display = 'block';
                await initRaceSelector();
                load();
            } else { alert("Denied."); }
        }

        function updateHostTitle(raceName) {
            const title = document.getElementById('host-title');
            if (!raceName) {
                title.innerText = `F1 Bingo ${CHAMPIONSHIP_YEAR} - Race Control`;
                return;
            }
            title.innerText = `${raceName} - Race Control`;
        }

        function extractRaceNamesFromCalendar(calendarText, year) {
            const raceNames = [];
            const seen = new Set();
            const linePattern = new RegExp(`FORMULA 1\\s+(.+?)\\s+${year}`, 'i');

            calendarText.split('\n').forEach(line => {
                if (!line.includes('FORMULA 1') || !line.includes(String(year))) return;
                const match = line.match(linePattern);
                if (!match) return;

                const candidate = match[1].replace(/\s+/g, ' ').trim();
                const isRaceName = /(GRAND PRIX|GRAN PREMIO|GRANDE PR)/i.test(candidate);
                const isTesting = /TESTING/i.test(candidate);
                if (!isRaceName || isTesting) return;
                if (seen.has(candidate)) return;

                seen.add(candidate);
                raceNames.push(candidate);
            });

            return raceNames;
        }

        async function fetchRaceNamesFromF1(year) {
            const sources = [
                `https://r.jina.ai/http://www.formula1.com/en/racing/${year}`,
                `https://r.jina.ai/http://www.formula1.com/en/racing/${year}.html`
            ];

            for (const source of sources) {
                try {
                    const res = await fetch(source, { cache: 'no-store' });
                    if (!res.ok) continue;
                    const text = await res.text();
                    const races = extractRaceNamesFromCalendar(text, year);
                    if (races.length >= 20) return races;
                } catch (err) {
                    console.warn(`Could not fetch race list from ${source}`, err);
                }
            }

            return FALLBACK_RACES_2026;
        }

        async function initRaceSelector() {
            const select = document.getElementById('race-select');
            const races = await fetchRaceNamesFromF1(CHAMPIONSHIP_YEAR);

            select.innerHTML = '<option value="">Select race</option>';
            races.forEach(race => {
                const option = document.createElement('option');
                option.value = race;
                option.textContent = race;
                select.appendChild(option);
            });
            select.disabled = false;

            const { data: selectedRaceRow } = await db
                .from('app_config')
                .select('value')
                .eq('key', 'selected_race_name')
                .maybeSingle();

            const selectedRace = selectedRaceRow?.value || '';
            if (selectedRace && !races.includes(selectedRace)) {
                const customOption = document.createElement('option');
                customOption.value = selectedRace;
                customOption.textContent = selectedRace;
                select.appendChild(customOption);
            }

            select.value = selectedRace;
            updateHostTitle(selectedRace);
        }

        async function saveSelectedRace() {
            const raceName = document.getElementById('race-select').value;
            updateHostTitle(raceName);
            if (!raceName) return;

            const { data: updatedRows, error: updateErr } = await db
                .from('app_config')
                .update({ value: raceName })
                .eq('key', 'selected_race_name')
                .select('key');

            if (updateErr) {
                console.error('Failed to save race selection.', updateErr);
                alert('Could not save selected race.');
                return;
            }

            if (!updatedRows || updatedRows.length === 0) {
                const { error: insertErr } = await db
                    .from('app_config')
                    .insert([{ key: 'selected_race_name', value: raceName }]);
                if (insertErr) {
                    console.error('Failed to insert race selection.', insertErr);
                    alert('Could not save selected race.');
                }
            }
        }

        async function load() {
            const { data: pool } = await db.from('f1_events_pool').select('*');
            const { data: live } = await db.from('live_race_state').select('*');
            const list = document.getElementById('list');
            list.innerHTML = "";

            pool.sort((a, b) => a.Event.localeCompare(b.Event));

            pool.forEach(ev => {
                const active = live.find(l => l.event_text === ev.Event)?.is_happened;

                const pts = ev.points || 1;
                const badgeColor = rarityColors[pts] || "#ffffff";

                const div = document.createElement('div');
                div.className = "event-row";

                div.setAttribute('data-event', ev.Event.toLowerCase());

                const span = document.createElement('span');
                span.style.display = "flex";
                span.style.justifyContent = "space-between";
                span.style.alignItems = "center";
                span.style.width = "70%";

                span.innerHTML = `
                    <span>${ev.Event}</span>
                    <span style="color: ${badgeColor}; border: 1px solid ${badgeColor}44; font-size: 0.8rem; padding: 2px 8px; border-radius: 12px; font-weight: bold; background: ${badgeColor}11;">
                        ${pts} PTS
                    </span>
                `;

                const btn = document.createElement('button');
                btn.className = active ? 'btn-on' : 'btn-mark';
                btn.innerText = active ? 'HAPPENED' : 'MARK';

                btn.addEventListener('click', () => {
                    toggle(ev.Event, !!active, pts);
                });

                div.appendChild(span);
                div.appendChild(btn);
                list.appendChild(div);
            });

            filterEvents();
        }

        function filterEvents() {
            const query = document.getElementById('event-search').value.toLowerCase();
            const rows = document.querySelectorAll('.event-row');

            rows.forEach(row => {
                const text = row.getAttribute('data-event');
                if (text.includes(query)) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }

        async function toggle(text, status, pointsValue) {
            const { error } = await db.from('live_race_state').upsert({
                event_text: text,
                is_happened: !status,
                points: pointsValue
            });

            if (error) {
                console.error("Error toggling event:", error);
            } else {
                load();
            }
        }

        function openModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function closeModal() {
            document.getElementById('add-modal').style.display = 'none';
            document.getElementById('new-event-text').value = "";
        }

        async function saveNewEvent() {
            const text = document.getElementById('new-event-text').value.trim();
            const pointsVal = parseInt(document.getElementById('new-event-points').value);

            if (!text) return;

            const { error: poolErr } = await db.from('f1_events_pool')
                .insert([{ Event: text, points: pointsVal }]);

            const { error: liveErr } = await db.from('live_race_state')
                .insert([{ event_text: text, is_happened: false, points: pointsVal }]);

            if (!poolErr && !liveErr) {
                closeModal();
                load();
            } else {
                console.error("Pool Error:", poolErr, "Live Error:", liveErr);
                alert("Error adding event. Check console for details.");
            }
        }
    </script>
</body>
</html>
